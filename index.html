<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="MediaClub – Discover and join clubs for your favorite books, games, and movies. Share recommendations and connect with fellow fans.">
    <meta name="author" content="MediaClub">
    <title>MediaClub - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>const t = localStorage.getItem('mediaclub_theme'); if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</head>

<body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <!-- Navigation -->
    <header class="navbar">
        <div class="logo">MediaClub</div>
        <nav class="nav-links" id="navLinks">
            <a href="index.html" class="active">Home</a>
            <a href="pages/clubs.html">Clubs</a>
            <a href="pages/profile.html">Profile</a>
            <a href="#" id="notifLink">Notifications <span class="notif-badge" id="notifBadge"
                    style="display:none;">0</span></a>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
            <span class="theme-icon" aria-hidden="true">🌙</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
    </header>

    <!-- Notifications Panel -->
    <aside class="notif-panel" id="notifPanel" role="complementary" aria-label="Notifications">
        <h3>Notifications</h3>
        <div class="notif-list" id="notifList">
            <p class="notif-empty">No new notifications</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="container" id="main-content">
        <!-- Search Bar -->
        <div class="search-bar" role="search">
            <label for="clubSearch" class="sr-only">Search Clubs</label>
            <input type="text" id="clubSearch" placeholder="Search Clubs...">
            <button class="search-icon" aria-label="Search"><span aria-hidden="true">🔍</span></button>
        </div>

        <!-- Featured Clubs -->
        <section class="section">
            <h2 class="section-title">Featured Clubs</h2>
            <div class="club-grid featured-clubs" id="featuredClubs">
                <!-- Rendered by JS -->
            </div>
        </section>

        <!-- Recommended Clubs -->
        <section class="section">
            <h2 class="section-title">Recommended Clubs</h2>
            <div class="club-grid recommended-clubs" id="recommendedClubs">
                <!-- Rendered by JS -->
            </div>
        </section>
    </main>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
        <div class="modal">
            <button class="modal-close" id="modalClose" aria-label="Close dialog">&times;</button>
            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <h2 id="authModalTitle">Log In</h2>
                <form id="loginFormEl">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Log In</button>
                    <p class="form-switch">Don't have an account? <a href="#" id="showRegister">Sign Up</a></p>
                    <p class="form-guest"><a href="#" id="guestLoginBtn">Continue as Guest</a></p>
                </form>
                <div id="registerForm" class="auth-form" style="display:none;">
                    <h2>Sign Up</h2>
                    <form id="registerFormEl">
                        <div class="form-group">
                            <label for="regUsername">Username</label>
                            <input type="text" id="regUsername" required minlength="3" maxlength="30">
                        </div>
                        <div class="form-group">
                            <label for="regEmail">Email</label>
                            <input type="email" id="regEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="regPassword">Password</label>
                            <input type="password" id="regPassword" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
                        <p class="form-switch">Already have an account? <a href="#" id="showLogin">Log In</a></p>
                        <p class="form-guest"><a href="#" id="guestRegisterBtn">Continue as Guest</a></p>
                    </form>
                </div>

                <script src="js/app.js" type="module"></script>
</body>

</html>
