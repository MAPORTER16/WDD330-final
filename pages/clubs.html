<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaClub - Clubs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header class="navbar">
        <div class="logo"><a href="../index.html">MediaClub</a></div>
        <nav class="nav-links" id="navLinks">
            <a href="../index.html">Home</a>
            <a href="clubs.html" class="active">Clubs</a>
            <a href="profile.html">Profile</a>
            <a href="#" id="notifLink">Notifications <span class="notif-badge" id="notifBadge"
                    style="display:none;">0</span></a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="notif-panel" id="notifPanel">
        <h3>Notifications</h3>
        <div class="notif-list" id="notifList">
            <p class="notif-empty">No new notifications</p>
        </div>
    </div>

    <main class="container">
        <div class="clubs-header">
            <h1>All Clubs</h1>
            <button class="btn btn-primary" id="createClubBtn">+ Create Club</button>
        </div>

        <!-- Filter / Search -->
        <div class="clubs-filter">
            <div class="search-bar search-bar-inline">
                <input type="text" id="clubSearchInput" placeholder="Search clubs by name or keyword...">
                <button class="search-icon" aria-label="Search">🔍</button>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-category="all">All</button>
                <button class="filter-tab" data-category="book">📚 Books</button>
                <button class="filter-tab" data-category="game">🎮 Games</button>
                <button class="filter-tab" data-category="movie">🎬 Movies</button>
            </div>
        </div>

        <div class="club-grid" id="clubsList">
            <!-- Rendered by JS -->
        </div>
    </main>

    <!-- Create Club Modal -->
    <div class="modal-overlay" id="createClubModal" style="display:none;">
        <div class="modal">
            <button class="modal-close" id="createClubClose">&times;</button>
            <h2>Create a New Club</h2>
            <form id="createClubForm">
                <div class="form-group">
                    <label for="clubName">Club Name</label>
                    <input type="text" id="clubName" required maxlength="60">
                </div>
                <div class="form-group">
                    <label for="clubDescription">Description</label>
                    <textarea id="clubDescription" rows="3" required maxlength="300"></textarea>
                </div>
                <div class="form-group">
                    <label for="clubCategory">Category</label>
                    <select id="clubCategory" required>
                        <option value="book">📚 Book</option>
                        <option value="game">🎮 Game</option>
                        <option value="movie">🎬 Movie</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="clubPrivate"> Make this club private
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Club</button>
            </form>
        </div>
    </div>

    <script src="../js/app.js" type="module"></script>
</body>

</html>
